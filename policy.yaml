# Policy: declarative tool authorization rules
# Each tool declares its allowed destinations.
# The PDP enforces this at every tool call — no exceptions at runtime.
# Version this file; a changed policy is an auditable event.

mode: active  # active | monitor — toggleable via dashboard POST /mode

tools:
  read_email:
    allowed_destinations: [mail.internal]
  read_file:
    allowed_destinations: [docs.internal, files.internal]
  http_get:
    allowed_destinations: [mail.internal, docs.internal]

# Prompt-carrier scan patterns (check 2).
# Strings matched case-insensitively against tool output.
# Document FP surface honestly — see sensor.py check_prompt_carrier docstring.
prompt_carrier_patterns:
  - "SYSTEM:"
  - "OVERRIDE"
  - "ignore previous"
  - "do not mention"
  - "compliance logging"
  - "send to"
  - "post to"
  # HTML/XML comment with imperative verb handled in code (regex)
