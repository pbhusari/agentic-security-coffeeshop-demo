<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agentic Security PDP — Decision Log</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d1117;
    color: #c9d1d9;
    font-family: 'Courier New', Courier, monospace;
    font-size: 13px;
    line-height: 1.5;
  }

  header {
    background: #161b22;
    border-bottom: 1px solid #30363d;
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 20px;
  }

  header h1 {
    font-size: 14px;
    color: #58a6ff;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  #mode-badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 3px;
    font-weight: bold;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .mode-active { background: #1a3a1a; color: #3fb950; border: 1px solid #3fb950; }
  .mode-monitor { background: #3a2a00; color: #d29922; border: 1px solid #d29922; }

  #mode-toggle {
    background: #21262d;
    color: #c9d1d9;
    border: 1px solid #30363d;
    padding: 3px 10px;
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
    border-radius: 3px;
  }

  #mode-toggle:hover { background: #30363d; }

  #status {
    margin-left: auto;
    font-size: 11px;
    color: #8b949e;
  }

  .layout {
    display: grid;
    grid-template-columns: 1fr 320px;
    grid-template-rows: auto 1fr;
    height: calc(100vh - 44px);
    gap: 0;
  }

  .panel {
    border: 1px solid #30363d;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .panel-header {
    background: #161b22;
    padding: 6px 12px;
    font-size: 11px;
    color: #8b949e;
    border-bottom: 1px solid #30363d;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    flex-shrink: 0;
  }

  /* Decision log — full left column */
  #log-panel {
    grid-column: 1;
    grid-row: 1 / 3;
  }

  #log-list {
    overflow-y: auto;
    flex: 1;
    padding: 8px;
  }

  .log-entry {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 4px;
    margin-bottom: 6px;
    cursor: pointer;
    transition: border-color 0.1s;
  }

  .log-entry:hover { border-color: #58a6ff; }

  .log-entry-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 10px;
  }

  .verdict-badge {
    font-size: 10px;
    font-weight: bold;
    padding: 1px 6px;
    border-radius: 2px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    flex-shrink: 0;
  }

  .verdict-allow  { background: #0d2a0d; color: #3fb950; border: 1px solid #3fb950; }
  .verdict-flag   { background: #2a1f00; color: #d29922; border: 1px solid #d29922; }
  .verdict-block  { background: #2a0d0d; color: #f85149; border: 1px solid #f85149; }

  .log-tool { color: #79c0ff; }
  .log-reason { color: #8b949e; font-size: 12px; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .log-time { color: #6e7681; font-size: 11px; flex-shrink: 0; }

  .log-entry-detail {
    display: none;
    padding: 8px 10px;
    border-top: 1px solid #21262d;
    background: #0d1117;
    font-size: 12px;
  }

  .log-entry-detail.open { display: block; }

  .detail-row { margin-bottom: 4px; }
  .detail-label { color: #8b949e; }
  .detail-val { color: #c9d1d9; word-break: break-all; }
  .detail-snippet {
    margin-top: 6px;
    background: #161b22;
    border: 1px solid #30363d;
    padding: 6px 8px;
    white-space: pre-wrap;
    word-break: break-word;
    color: #8b949e;
    max-height: 120px;
    overflow-y: auto;
  }

  /* Session panel — top right */
  #session-panel {
    grid-column: 2;
    grid-row: 1;
  }

  #session-content {
    padding: 10px 12px;
    flex: 1;
    overflow-y: auto;
  }

  .session-label { color: #8b949e; font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
  .session-val { color: #c9d1d9; margin-bottom: 12px; }

  #counters { display: flex; gap: 12px; margin-bottom: 10px; }
  .counter { text-align: center; }
  .counter-num { font-size: 20px; font-weight: bold; display: block; }
  .counter-label { font-size: 10px; color: #8b949e; text-transform: uppercase; }
  .c-allow { color: #3fb950; }
  .c-flag   { color: #d29922; }
  .c-block  { color: #f85149; }

  /* Policy panel — bottom right */
  #policy-panel {
    grid-column: 2;
    grid-row: 2;
  }

  #policy-content {
    padding: 10px 12px;
    flex: 1;
    overflow-y: auto;
  }

  pre {
    white-space: pre-wrap;
    word-break: break-word;
    color: #e6edf3;
    font-size: 12px;
    line-height: 1.6;
  }

  .highlight-check { background: #2a1f00; border-left: 2px solid #d29922; padding-left: 4px; }

  #empty-state {
    color: #6e7681;
    text-align: center;
    padding: 40px 20px;
  }
</style>
</head>
<body>

<header>
  <h1>Agentic Security PDP</h1>
  <span id="mode-badge" class="mode-active">ACTIVE</span>
  <button id="mode-toggle">Switch to Monitor</button>
  <span id="status">connecting…</span>
</header>

<div class="layout">

  <!-- Decision Log -->
  <div class="panel" id="log-panel">
    <div class="panel-header">Decision Log — all PDP verdicts, newest first</div>
    <div id="log-list">
      <div id="empty-state">No decisions yet. Start the agent to see verdicts.</div>
    </div>
  </div>

  <!-- Active Session -->
  <div class="panel" id="session-panel">
    <div class="panel-header">Session</div>
    <div id="session-content">
      <div id="counters">
        <div class="counter"><span class="counter-num c-allow" id="cnt-allow">0</span><span class="counter-label">Allow</span></div>
        <div class="counter"><span class="counter-num c-flag"  id="cnt-flag">0</span><span class="counter-label">Flag</span></div>
        <div class="counter"><span class="counter-num c-block" id="cnt-block">0</span><span class="counter-label">Block</span></div>
      </div>
      <div class="session-label">Last tool</div>
      <div class="session-val" id="last-tool">—</div>
      <div class="session-label">Last verdict</div>
      <div class="session-val" id="last-verdict">—</div>
      <div class="session-label">Last check fired</div>
      <div class="session-val" id="last-check">—</div>
    </div>
  </div>

  <!-- Policy Panel -->
  <div class="panel" id="policy-panel">
    <div class="panel-header">Active Policy (policy.yaml)</div>
    <div id="policy-content">
      <pre id="policy-pre">loading…</pre>
    </div>
  </div>

</div>

<script>
  const state = { allow: 0, flag: 0, block: 0, lastCheck: null };

  // --- Mode toggle ---
  const modeBadge = document.getElementById('mode-badge');
  const modeToggle = document.getElementById('mode-toggle');

  async function fetchMode() {
    const r = await fetch('/mode');
    const d = await r.json();
    applyMode(d.mode);
  }

  function applyMode(mode) {
    modeBadge.textContent = mode.toUpperCase();
    modeBadge.className = mode === 'active' ? 'mode-active' : 'mode-monitor';
    modeToggle.textContent = mode === 'active' ? 'Switch to Monitor' : 'Switch to Active';
  }

  modeToggle.addEventListener('click', async () => {
    const current = modeBadge.textContent.toLowerCase();
    const next = current === 'active' ? 'monitor' : 'active';
    await fetch('/mode', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({mode: next}) });
    applyMode(next);
  });

  // --- Policy panel ---
  async function loadPolicy() {
    const r = await fetch('/policy');
    const d = await r.json();
    document.getElementById('policy-pre').textContent = JSON.stringify(d, null, 2);
  }

  // --- Decision log via SSE ---
  const logList = document.getElementById('log-list');
  const emptyState = document.getElementById('empty-state');

  function formatTime(ts) {
    const d = new Date(ts * 1000);
    return d.toLocaleTimeString('en-US', {hour12: false});
  }

  function addEntry(entry) {
    if (emptyState.parentNode) emptyState.remove();

    // Update counters
    const v = entry.verdict;
    if (v === 'allow') state.allow++;
    else if (v === 'flag') state.flag++;
    else if (v === 'block') state.block++;

    document.getElementById('cnt-allow').textContent = state.allow;
    document.getElementById('cnt-flag').textContent = state.flag;
    document.getElementById('cnt-block').textContent = state.block;

    // Update session
    document.getElementById('last-tool').textContent = entry.tool;
    document.getElementById('last-verdict').textContent = v;
    document.getElementById('last-check').textContent = entry.check_fired || '—';

    // Highlight policy if a check fired
    if (entry.check_fired && entry.check_fired !== state.lastCheck) {
      state.lastCheck = entry.check_fired;
      highlightPolicyCheck(entry.check_fired);
    }

    // Build entry element
    const el = document.createElement('div');
    el.className = 'log-entry';

    const paramsStr = JSON.stringify(entry.params || {});

    el.innerHTML = `
      <div class="log-entry-header">
        <span class="verdict-badge verdict-${v}">${v}</span>
        <span class="log-tool">${entry.tool}</span>
        <span class="log-reason">${escHtml(entry.reason)}</span>
        <span class="log-time">${formatTime(entry.timestamp)}</span>
      </div>
      <div class="log-entry-detail">
        <div class="detail-row"><span class="detail-label">call_id: </span><span class="detail-val">${entry.call_id}</span></div>
        <div class="detail-row"><span class="detail-label">check: </span><span class="detail-val">${entry.check_fired || '—'}</span></div>
        <div class="detail-row"><span class="detail-label">params: </span><span class="detail-val">${escHtml(paramsStr)}</span></div>
        ${entry.output_snippet ? `<div class="detail-snippet">${escHtml(entry.output_snippet)}</div>` : ''}
      </div>
    `;

    el.querySelector('.log-entry-header').addEventListener('click', () => {
      const detail = el.querySelector('.log-entry-detail');
      detail.classList.toggle('open');
    });

    // Newest at top
    logList.insertBefore(el, logList.firstChild);
  }

  function escHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function highlightPolicyCheck(checkName) {
    const pre = document.getElementById('policy-pre');
    // Just re-render with a note — crude but dependency-free
    const text = pre.textContent;
    pre.innerHTML = escHtml(text);
    // Append highlighted note
    const note = document.createElement('div');
    note.className = 'highlight-check';
    note.textContent = `⚡ Last fired: ${checkName}`;
    pre.appendChild(note);
  }

  // Connect SSE
  const evtSrc = new EventSource('/events');
  const statusEl = document.getElementById('status');

  evtSrc.onopen = () => { statusEl.textContent = 'connected'; };
  evtSrc.onerror = () => { statusEl.textContent = 'reconnecting…'; };

  evtSrc.onmessage = (e) => {
    const entry = JSON.parse(e.data);
    addEntry(entry);
  };

  // Init
  fetchMode();
  loadPolicy();
</script>
</body>
</html>
